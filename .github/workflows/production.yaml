name: Deploy Production

# Deploy only on trusted history: a push to main/master on this repository.
# Do not use workflow_run + workflow_run.head_sha: fork PRs can name a branch
# "main", satisfy branches: [main], and pass a malicious head_sha while Lint
# (pull_request, no secrets) still succeeds.
on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Tell IndexNow-enabled engines (Bing, and through it AI assistants)
      # that the site changed. Non-blocking: a failed ping must not fail
      # the deploy.
      - name: Notify IndexNow
        run: node scripts/indexnow-submit.js
        continue-on-error: true
