name: Compliance
on:
  push:
    branches: [main]   # scope to the default branch so a PR push isn't scanned twice
  pull_request: null

permissions:
  contents: read
  security-events: write   # required to upload SARIF to Code Scanning

jobs:
  plumber:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      # gitleaks powers the pipelineMustNotLeakSecretsInConfig control.
      # Checksum-verified release binary (no pipe-to-shell, no mutable tag).
      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          curl -sSfL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          rm gitleaks gitleaks.tar.gz

      - uses: getplumber/plumber@e2ab0a859edf8ac868ffc726916ea5053c1bf356   # v0.3.56
        with:
          threshold: 100
